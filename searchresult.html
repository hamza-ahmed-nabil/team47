  <main>
    
    <aside class="filters">
        <h1>FILTERS</h1>


            <div class="filterGroup">
                <h3>Scope</h3>
                <div class="filterLabels">
                    <label><input type="checkbox" name="scope" value="global"> Global</label>
                    <label><input type="checkbox" name="scope" value="local"> Local</label>
                </div>
            </div>

            <div class="filterGroup">
                <h3>Sport</h3>
                <div class="filterLabels">
                    <label><input type="checkbox" name="sport" value="football"> Football</label>
                    <label><input type="checkbox" name="sport" value="boxing"> Boxing</label>
                    <label><input type="checkbox" name="sport" value="darts"> Darts</label>
                </div>
            </div>

            <div class="filterGroup">
                <h3>Sort By</h3>
                <div class="filterLabels">
                    <label><input type="radio" name="sort" value="newest"> Newest</label>
                    <label><input type="radio" name="sort" value="oldest"> Oldest</label>
                    <label><input type="radio" name="sort" value="popular"> Most Popular</label>
                </div>
            </div>
                </aside>




    <section class="featured">
      <div class="featuredGrid"></div>
    </section>
  </main>

  <footer>

  </footer>

  <script src="scripts/articles.js"></script>
  <script src="scripts/auth.js"></script>
  <script>
    if (localStorage.getItem('darkMode') === 'true') {
      document.body.classList.add('dark-mode');
    }

    function toggleDarkMode() {
      document.body.classList.toggle('dark-mode');
      localStorage.setItem('darkMode', document.body.classList.contains('dark-mode'));
    }

    initAuthNav();
    initArticleSearch();
    initArticleFilters();
    renderSearchResults();
  </script>
</body>
